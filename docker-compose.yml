services:
  sql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - kraft-data:/var/opt/mssql
    networks:
      - kraft-net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: src/KRAFT.Results.WebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - ConnectionStrings__kraft-db=Server=sql,1433;Database=kraft-db;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True
      - Jwt__Key=${JWT_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
      - Jwt__ExpirationInMinutes=60
    depends_on:
      sql:
        condition: service_started
    networks:
      - kraft-net
      - proxy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: src/KRAFT.Results.Web/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_FORWARDEDHEADERS_ENABLED=true
      - API__BaseAddress=https://kraft-api.karirafn.is
    depends_on:
      api:
        condition: service_started
    networks:
      - kraft-net
      - proxy
    restart: unless-stopped

volumes:
  kraft-data:
    name: kraft-data

networks:
  kraft-net:
    driver: bridge
  proxy:
    external: true
